# SonarQube Project Configuration
sonar.projectKey=cmis-college-management-system
sonar.projectName=College Management Information System (CMIS)
sonar.projectVersion=1.0.0

# Paths to source code
sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java

# Exclude compiled libraries and dependency folders
sonar.exclusions=**/node_modules/**,**/dist/**,**/target/**,**/*.json,**/*.yml,**/*.yaml,**/*.md,**/*.css,**/*.spec.ts,**/*.test.tsx

# Project language specifications
sonar.language=java,ts,js
sonar.java.binaries=backend/target/classes
sonar.sourceEncoding=UTF-8
