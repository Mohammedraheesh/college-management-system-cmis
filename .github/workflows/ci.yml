name: CMIS CI-CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Build & test Spring Boot API
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Maven Unit Tests
        run: |
          cd backend
          mvn clean test

  # Job 2: Build & test React client
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node Packages & Compile
        run: |
          cd frontend
          npm ci
          npm run build

  # Job 3: Build & verify Docker containers
  docker-ci:
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Build Backend Image
        run: docker build -t cmis-backend:latest ./backend

      - name: Build Frontend Image
        run: docker build -t cmis-frontend:latest ./frontend

  # Job 4: Optional deployment placeholder
  deploy-cloud:
    needs: docker-ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Print Deployment Notice
        run: |
          echo "Verifying deployment configs..."
          echo "To integrate automated cloud delivery (e.g. AWS EC2 or Azure VM):"
          echo "1. Set up SSH secrets (SSH_PRIVATE_KEY, SERVER_IP, SERVER_USER) in GitHub Secrets."
          echo "2. Add a step using appleboy/ssh-action to SSH into the host server."
          echo "3. Execute: cd /app && git pull && docker compose down && docker compose up -d --build"
